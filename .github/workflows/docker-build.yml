name: Build and Push Images

env:
  VERSION: "3.0.0"
  REGISTRY: ghcr.io

on:
  push:
    tags:
      - "[0-9]*"

jobs:
  check-version:
    name: Check Version and Decide Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_build: ${{ steps.version.outputs.should_build }}
      should_build_gost: ${{ steps.version.outputs.should_build_gost }}
      is_tag: ${{ steps.version.outputs.is_tag }}
      image_owner: ${{ steps.version.outputs.image_owner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version and build strategy
        id: version
        run: |
          IMAGE_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image_owner=$IMAGE_OWNER" >> $GITHUB_OUTPUT

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_build_gost=true" >> $GITHUB_OUTPUT
          else
            VERSION="${{ env.VERSION }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT

            if git rev-parse "$VERSION" >/dev/null 2>&1; then
              echo "should_build=false" >> $GITHUB_OUTPUT

              TAG_COMMIT=$(git rev-list -n 1 "$VERSION")
              if git diff --quiet --ignore-all-space --ignore-blank-lines $TAG_COMMIT HEAD -- go-gost/ 2>/dev/null; then
                echo "should_build_gost=false" >> $GITHUB_OUTPUT
              else
                echo "should_build_gost=true" >> $GITHUB_OUTPUT
              fi
            else
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "should_build_gost=true" >> $GITHUB_OUTPUT
            fi
          fi

  build-gost:
    name: Build GOST Binaries
    needs: check-version
    if: needs.check-version.outputs.should_build_gost == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go-gost/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build GOST binary (AMD64)
        working-directory: ./go-gost
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version=${{ needs.check-version.outputs.version }}" -o gost-amd64

      - name: Build GOST binary (ARM64)
        working-directory: ./go-gost
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X main.version=${{ needs.check-version.outputs.version }}" -o gost-arm64

      - name: Generate SHA256 checksums
        working-directory: ./go-gost
        run: |
          sha256sum gost-amd64 > gost-amd64.sha256
          sha256sum gost-arm64 > gost-arm64.sha256

      - name: Upload GOST AMD64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: gost-binary-amd64
          path: ./go-gost/gost-amd64

      - name: Upload GOST ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: gost-binary-arm64
          path: ./go-gost/gost-arm64

      - name: Upload GOST AMD64 checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: gost-checksum-amd64
          path: ./go-gost/gost-amd64.sha256

      - name: Upload GOST ARM64 checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: gost-checksum-arm64
          path: ./go-gost/gost-arm64.sha256

  build-vite:
    name: Build and Push Frontend Package
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build args
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          {
            echo "VITE_GITHUB_REPO=https://github.com/${{ github.repository }}"
            echo "VITE_APP_VERSION=$VERSION"
          } > ./vite-frontend/.env.production

      - name: Build and push frontend image
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          OWNER="${{ needs.check-version.outputs.image_owner }}"

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -t ${{ env.REGISTRY }}/${OWNER}/flvx-svc-frontend:latest \
            -t ${{ env.REGISTRY }}/${OWNER}/flvx-svc-frontend:${VERSION} \
            ./vite-frontend

  build-go-backend:
    name: Build and Push Backend Package
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Cache Go dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-backend-${{ hashFiles('go-backend/go.sum') }}
          restore-keys: ${{ runner.os }}-go-backend-

      - name: Download dependencies
        working-directory: ./go-backend
        run: go mod download

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          OWNER="${{ needs.check-version.outputs.image_owner }}"

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -t ${{ env.REGISTRY }}/${OWNER}/flvx-svc-backend:latest \
            -t ${{ env.REGISTRY }}/${OWNER}/flvx-svc-backend:${VERSION} \
            ./go-backend

  create-release:
    name: Create Release
    needs: [check-version, build-gost, build-vite, build-go-backend]
    if: needs.check-version.outputs.is_tag == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download GOST AMD64 binary
        uses: actions/download-artifact@v4
        with:
          name: gost-binary-amd64
          path: ./artifacts/amd64

      - name: Download GOST ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: gost-binary-arm64
          path: ./artifacts/arm64

      - name: Download GOST AMD64 checksum
        uses: actions/download-artifact@v4
        with:
          name: gost-checksum-amd64
          path: ./artifacts/

      - name: Download GOST ARM64 checksum
        uses: actions/download-artifact@v4
        with:
          name: gost-checksum-arm64
          path: ./artifacts/

      - name: Prepare release files
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          OWNER="${{ needs.check-version.outputs.image_owner }}"

          mv ./artifacts/amd64/gost-amd64 ./artifacts/gost-amd64
          mv ./artifacts/arm64/gost-arm64 ./artifacts/gost-arm64

          cp docker-compose-v4.yml ./artifacts/docker-compose-v4.yml
          cp docker-compose-v6.yml ./artifacts/docker-compose-v6.yml

          sed -i "s|image: .*flvx-svc-backend:[^[:space:]]*|image: ${{ env.REGISTRY }}/${OWNER}/flvx-svc-backend:${VERSION}|g" ./artifacts/docker-compose-v4.yml
          sed -i "s|image: .*flvx-svc-frontend:[^[:space:]]*|image: ${{ env.REGISTRY }}/${OWNER}/flvx-svc-frontend:${VERSION}|g" ./artifacts/docker-compose-v4.yml
          sed -i "s|image: .*flvx-svc-backend:[^[:space:]]*|image: ${{ env.REGISTRY }}/${OWNER}/flvx-svc-backend:${VERSION}|g" ./artifacts/docker-compose-v6.yml
          sed -i "s|image: .*flvx-svc-frontend:[^[:space:]]*|image: ${{ env.REGISTRY }}/${OWNER}/flvx-svc-frontend:${VERSION}|g" ./artifacts/docker-compose-v6.yml

          cp install.sh ./artifacts/install.sh
          cp panel_install.sh ./artifacts/panel_install.sh

          sed -i "s|^PINNED_VERSION=\"\"|PINNED_VERSION=\"${VERSION}\"|" ./artifacts/install.sh
          sed -i "s|^PINNED_VERSION=\"\"|PINNED_VERSION=\"${VERSION}\"|" ./artifacts/panel_install.sh

          mkdir -p ./artifacts/offline-amd64 ./artifacts/offline-arm64
          cp ./artifacts/gost-amd64 ./artifacts/offline-amd64/flux_agent
          cp ./artifacts/install.sh ./artifacts/offline-amd64/offline.sh
          cp ./artifacts/gost-arm64 ./artifacts/offline-arm64/flux_agent
          cp ./artifacts/install.sh ./artifacts/offline-arm64/offline.sh
          cd ./artifacts/offline-amd64 && zip -r ../offline-amd64.zip . && cd ../..
          cd ./artifacts/offline-arm64 && zip -r ../offline-arm64.zip . && cd ../..

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          OWNER="${{ needs.check-version.outputs.image_owner }}"

          IS_PRERELEASE=false
          if [[ "$VERSION" =~ -(dev|beta|alpha|rc) ]]; then
            IS_PRERELEASE=true
          fi

          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          COMMIT_DATE=$(git log -1 --pretty=format:"%ai")

          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = true ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${VERSION}" \
            $PRERELEASE_FLAG \
            --title "Release ${VERSION}" \
            --notes "## Release Information

          - **Version**: ${VERSION}
          - **Commit**: [\`${GITHUB_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          - **Author**: ${COMMIT_AUTHOR}
          - **Date**: ${COMMIT_DATE}
          - **Message**: ${COMMIT_MSG}

          ## Packages

          \`\`\`bash
          docker pull ${{ env.REGISTRY }}/${OWNER}/flvx-svc-backend:${VERSION}
          docker pull ${{ env.REGISTRY }}/${OWNER}/flvx-svc-frontend:${VERSION}
          \`\`\`

          ## Quick Install

          **Panel (${VERSION})**
          \`\`\`bash
          curl -L https://github.com/${{ github.repository }}/releases/download/${VERSION}/panel_install.sh -o panel_install.sh && chmod +x panel_install.sh && ./panel_install.sh
          \`\`\`

          **Node (${VERSION})**
          \`\`\`bash
          curl -L https://github.com/${{ github.repository }}/releases/download/${VERSION}/install.sh -o install.sh && chmod +x install.sh && ./install.sh
          \`\`\`" \
            --repo ${{ github.repository }}

          gh release upload "${VERSION}" ./artifacts/gost-amd64 --clobber
          gh release upload "${VERSION}" ./artifacts/gost-arm64 --clobber
          gh release upload "${VERSION}" ./artifacts/gost-amd64.sha256 --clobber
          gh release upload "${VERSION}" ./artifacts/gost-arm64.sha256 --clobber
          gh release upload "${VERSION}" ./artifacts/install.sh --clobber
          gh release upload "${VERSION}" ./artifacts/panel_install.sh --clobber
          gh release upload "${VERSION}" ./artifacts/docker-compose-v4.yml --clobber
          gh release upload "${VERSION}" ./artifacts/docker-compose-v6.yml --clobber
          gh release upload "${VERSION}" ./artifacts/offline-amd64.zip --clobber
          gh release upload "${VERSION}" ./artifacts/offline-arm64.zip --clobber

          if [ "$IS_PRERELEASE" = false ]; then
            RELEASE_ID=$(gh release view "${VERSION}" --json databaseId --jq '.databaseId')
            gh api -X PATCH repos/${{ github.repository }}/releases/${RELEASE_ID} -f make_latest="true"
          fi

  update-release-gost:
    name: Update GOST Assets in Existing Release
    needs: [check-version, build-gost]
    if: needs.check-version.outputs.is_tag == 'false' && needs.check-version.outputs.should_build == 'false' && needs.check-version.outputs.should_build_gost == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download GOST AMD64 binary
        uses: actions/download-artifact@v4
        with:
          name: gost-binary-amd64
          path: ./artifacts/amd64

      - name: Download GOST ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: gost-binary-arm64
          path: ./artifacts/arm64

      - name: Download GOST AMD64 checksum
        uses: actions/download-artifact@v4
        with:
          name: gost-checksum-amd64
          path: ./artifacts/

      - name: Download GOST ARM64 checksum
        uses: actions/download-artifact@v4
        with:
          name: gost-checksum-arm64
          path: ./artifacts/

      - name: Rename binaries and build offline packages
        run: |
          mv ./artifacts/amd64/gost-amd64 ./artifacts/gost-amd64
          mv ./artifacts/arm64/gost-arm64 ./artifacts/gost-arm64
          mkdir -p ./artifacts/offline-amd64 ./artifacts/offline-arm64
          cp ./artifacts/gost-amd64 ./artifacts/offline-amd64/flux_agent
          cp ./install.sh ./artifacts/offline-amd64/offline.sh
          cp ./artifacts/gost-arm64 ./artifacts/offline-arm64/flux_agent
          cp ./install.sh ./artifacts/offline-arm64/offline.sh
          cd ./artifacts/offline-amd64 && zip -r ../offline-amd64.zip . && cd ../..
          cd ./artifacts/offline-arm64 && zip -r ../offline-arm64.zip . && cd ../..

      - name: Upload refreshed release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"

          gh release upload "${VERSION}" ./artifacts/gost-amd64 --clobber
          gh release upload "${VERSION}" ./artifacts/gost-arm64 --clobber
          gh release upload "${VERSION}" ./artifacts/gost-amd64.sha256 --clobber
          gh release upload "${VERSION}" ./artifacts/gost-arm64.sha256 --clobber
          gh release upload "${VERSION}" ./artifacts/offline-amd64.zip --clobber
          gh release upload "${VERSION}" ./artifacts/offline-arm64.zip --clobber
