site_name: FLVX 文档
site_url: https://ikeilo.github.io/FLVXR2/
site_description: FLVX 官方文档
site_author: iKeilo

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

docs_dir: doc

nav:
  - 首页: index.md
  - 安装部署: install.md
  - 使用指南: usage.md
  - AI Skill 接入: ai-skill.md
  - PostgreSQL: postgresql.md
  - 常见问题: faq.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
